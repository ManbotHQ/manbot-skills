# ─────────────────────────────────────
#  GitHub Actions workflow – validate SKILL.md files
# ─────────────────────────────────────
name: Test SKILL.md files

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-skill-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Validate SKILL.md files
        run: |
          #!/usr/bin/env bash
          shopt -s nullglob
          echo "🔍 Running validation for all SKILL.md files…"
          for file in $(find . -type f -name 'SKILL.md'); do
            echo "→ Checking $file"
            first_line=$(head -n1 "$file")
            if [[ "$first_line" =~ ^([> ])?Description: ]]; then
              echo "✓ $file starts correctly"
            else
              echo "✘ $file does NOT start with a Description line" >&2
              exit 1
            fi
          done
